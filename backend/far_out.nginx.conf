server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name tracker.faroutlaunch.org www.tracker.faroutlaunch.org;

  client_max_body_size 10m;

  # Cert should be a bundle of the domain cert and CA cert bundle
  ssl_certificate /etc/ssl/tracker.faroutlaunch.org_bundle.crt;
  ssl_certificate_key /etc/ssl/private/tracker.faroutlaunch.org_key.txt;

  root /var/www/fartracker;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://api.mapbox.com; worker-src blob:; style-src 'self' 'unsafe-inline' https://api.mapbox.com; connect-src 'self' https://api.mapbox.com https://events.mapbox.com; img-src 'self' data: https://api.mapbox.com; font-src 'self' https://api.mapbox.com; frame-ancestors 'none';" always;

  # ACME challenge path - used to verify that we control the domain for SSL cert
  location ^~ /.well-known/pki-validation/ {
    allow all;
    # eg. /var/www/ssls.com/.well-known/pki-validation/ABC.txt
    root /var/www/ssls.com;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html =404;
  }

  location /api/ {
    proxy_pass http://localhost:8000;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass http://localhost:8000;

    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
