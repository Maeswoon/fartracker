server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name tracker.faroutlaunch.org www.tracker.faroutlaunch.org;

  # Cert should be a bundle of the domain cert and CA cert bundle
  ssl_certificate /etc/ssl/tracker.faroutlaunch.org_bundle.crt;
  ssl_certificate_key /etc/ssl/private/tracker.faroutlaunch.org_key.txt;

  root /var/www/fartracker;
  index index.html;

  # ACME challenge path - used to verify that we control the domain for SSL cert
  location ^~ /.well-known/pki-validation/ {
    allow all;
    # eg. /var/www/ssls.com/.well-known/pki-validation/ABC.txt
    root /var/www/ssls.com;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html =404;
  }

  location /api/ {
    proxy_pass http://localhost:8000/;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
